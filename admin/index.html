<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AYDINOĞLU Admin Panel</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
<section class="login" id="login">
  <form id="loginForm">
    <img src="../Foto/Aydinoglu_mebel_berde_logo.jpg" alt="">
    <h1>AYDINOĞLU Admin</h1>
    <p>Məhsul və sorğu idarəetmə paneli</p>
    <input type="email" name="email" value="admin@aydinoglugroup.az" required>
    <input type="password" name="password" value="Aydinoglu@2026" required>
    <button>Daxil ol</button>
    <small id="loginStatus"></small>
  </form>
</section>

<main class="app" id="app" hidden>
  <aside class="side">
    <div class="side-brand">
      <img src="../Foto/Aydinoglu_mebel_berde_logo.jpg" alt="">
      <strong>AYDINOĞLU</strong>
      <small>Admin Panel</small>
    </div>

    <button class="tab active" data-view="dashboard">Panel</button>
    <button class="tab" data-view="products">Məhsullar</button>
    <button class="tab" data-view="categories">Kateqoriyalar</button>
    <button class="tab" data-view="leads">Sorğular</button>
    <button class="tab" data-view="settings">Ayarlar</button>

    <a href="../" target="_blank">Sayta bax</a>
    <button id="logoutBtn">Çıxış</button>
  </aside>

  <section class="main">
    <header class="head">
      <h1>ADMIN PANEL | MEBEL SALONU</h1>
      <div><span>Admin</span><b id="bellCount">0</b></div>
    </header>

    <section class="view active" id="dashboard">
      <div class="stats">
        <article><span>Cəmi məhsul</span><b id="statProducts">0</b></article>
        <article><span>Yeni sorğu</span><b id="statLeads">0</b></article>
        <article><span>Seçilmiş</span><b id="statFeatured">0</b></article>
      </div>
    </section>

    <section class="view" id="products">
      <div class="toolbar">
        <button id="newProductBtn">Yeni məhsul</button>
      </div>

      <form class="form" id="productForm">
        <input type="hidden" name="id">
        <input name="name" required placeholder="Məhsul adı">
        <input name="sku" placeholder="Kod">
        <select name="category_id" id="productCategory"></select>
        <input type="number" name="stock" placeholder="Stok">
        <input type="number" name="price" placeholder="Qiymət">
        <input type="number" name="sale_price" placeholder="Endirimli qiymət">
        <input name="colors" placeholder="Rənglər">
        <input name="material" placeholder="Material">
        <input type="number" name="width_cm" placeholder="En sm">
        <input type="number" name="height_cm" placeholder="Hündürlük sm">
        <input type="number" name="length_cm" placeholder="Uzunluq sm">
        <input type="number" name="depth_cm" placeholder="Dərinlik sm">
        <textarea name="description" placeholder="Təsvir"></textarea>
        <select name="stock_status">
          <option value="in_stock">Stokda</option>
          <option value="preorder">Sifarişlə</option>
          <option value="sold_out">Bitib</option>
        </select>
        <label><input type="checkbox" name="featured"> Seçilmiş</label>
        <label><input type="checkbox" name="is_active" checked> Aktiv</label>
        <input type="file" id="productImages" accept="image/*" multiple>
        <button>Yadda saxla</button>
        <small id="productStatus"></small>
      </form>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Şəkil</th><th>Kod</th><th>Məhsul</th><th>Kateqoriya</th><th>Stok</th><th>Qiymət</th><th>Əməliyyat</th></tr>
          </thead>
          <tbody id="productRows"></tbody>
        </table>
      </div>
    </section>

    <section class="view" id="categories">
      <form class="form small" id="categoryForm">
        <input type="hidden" name="id">
        <input name="name" required placeholder="Kateqoriya adı">
        <input name="slug" placeholder="slug">
        <input type="number" name="sort_order" value="1">
        <button>Yadda saxla</button>
        <small id="categoryStatus"></small>
      </form>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Ad</th><th>Slug</th><th>Sıra</th><th>Əməliyyat</th></tr></thead>
          <tbody id="categoryRows"></tbody>
        </table>
      </div>
    </section>

    <section class="view" id="leads">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Ad</th><th>Telefon</th><th>Məhsul</th><th>Qeyd</th><th>Status</th><th>Əməliyyat</th></tr></thead>
          <tbody id="leadRows"></tbody>
        </table>
      </div>
    </section>

    <section class="view" id="settings">
      <form class="form small" id="settingsForm">
        <input name="store_name" placeholder="Mağaza adı">
        <input name="phone" placeholder="Telefon">
        <input name="whatsapp" placeholder="WhatsApp">
        <input name="instagram_url" placeholder="Instagram">
        <input name="tiktok_url" placeholder="TikTok">
        <input name="address" placeholder="Ünvan">
        <input name="working_hours" placeholder="İş saatları">
        <button>Ayarları saxla</button>
        <small id="settingsStatus"></small>
      </form>
    </section>
  </section>
</main>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="./admin.js"></script>
</body>
</html>
